task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]
 
num_classes: 1 # your dataset classes
remap_mscoco_category: False
 
train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /mnt/sdc/chenpei/Hi-C/Abnormal_region_matrix_later_2/all_Abnormal_region_matrix_graph_rot
    ann_file: /mnt/sdc/chenpei/Hi-C/Abnormal_region_matrix_later_2/coco_data/instances_train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction
 
 
val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /mnt/sdc/chenpei/Hi-C/Abnormal_region_matrix_later_2/all_Abnormal_region_matrix_graph_rot
    ann_file: /mnt/sdc/chenpei/Hi-C/Abnormal_region_matrix_later_2/coco_data/instances_val.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction